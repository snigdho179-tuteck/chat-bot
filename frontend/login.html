<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR-Assistant | Login</title>
  <style>
    :root {
      --primary: #7559e8;
      --primary-dark: #5d46d2;
      --primary-soft: #c6b8ff;
      --panel: rgba(255, 255, 255, 0.82);
      --text: #101828;
      --muted: #667085;
      --line: #dce2f2;
      --shadow: 0 18px 48px rgba(74, 89, 135, 0.16);
      --radius-lg: 24px;
      --radius-md: 15px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      color: var(--text);
      background:
        radial-gradient(circle at 72% 10%, rgba(117, 89, 232, 0.15), transparent 32%),
        radial-gradient(circle at 16% 88%, rgba(198, 184, 255, 0.24), transparent 30%),
        linear-gradient(135deg, #fafbff 0%, #f4f6ff 48%, #eef2ff 100%);
      overflow: hidden;
    }

    .page {
      min-height: 100vh;
      padding: 24px 32px 18px;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      width: min(1020px, 100%);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 36px;
      height: 36px;
      object-fit: contain;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: white;
    }

    .brand-text h1 {
      font-size: 26px;
      letter-spacing: -0.055em;
      margin-bottom: 2px;
    }

    .brand-text p {
      color: #536179;
      font-size: 15px;
    }

    .status-pill {
      padding: 10px 16px;
      border-radius: 999px;
      color: #314059;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(220, 226, 242, 0.96);
      box-shadow: 0 8px 24px rgba(72, 84, 129, 0.10);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .login-center {
      flex: 1;
      width: min(1020px, 100%);
      margin: 0 auto;
      display: grid;
      place-items: center;
      padding: 20px 0 10px;
      min-height: 0;
    }

    .login-card {
      width: min(460px, 100%);
      padding: 29px 10px;
      border-radius: var(--radius-lg);
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
    }

    .login-icon {
      width: 60px;
      height: 60px;
      display: grid;
      place-items: center;
      margin: 0 auto 5px;
      color: #fff;
      border-radius: 16px;
    }

    .login-card h2 {
      text-align: center;
      font-size: 24px;
      letter-spacing: -0.04em;
      margin-bottom: 5px;
    }

    .login-card .subtitle {
      text-align: center;
      color: var(--muted);
      line-height: 1.45;
      margin-bottom: 20px;
      font-size: 15px;
    }

    .role-tabs {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      padding: 5px;
      margin-bottom: 18px;
      border-radius: 16px;
      background: #eef2ff;
      border: 1px solid #e0e6f7;
    }

    .role-tab {
      border: 0;
      cursor: pointer;
      padding: 11px 10px;
      border-radius: 13px;
      color: #657086;
      background: transparent;
      font-weight: 800;
      transition: 0.2s ease;
    }

    .role-tab.active {
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      box-shadow: 0 9px 20px rgba(117, 89, 232, 0.22);
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: #344054;
      font-size: 14px;
      font-weight: 750;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      top: 50%;
      left: 15px;
      width: 18px;
      height: 18px;
      transform: translateY(-50%);
      color: #98a2b3;
      pointer-events: none;
    }

    input {
      width: 100%;
      height: 50px;
      border: 1px solid #d9e0ef;
      border-radius: var(--radius-md);
      padding: 0 15px 0 44px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.88);
      outline: none;
      font-size: 15px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    input:focus {
      border-color: var(--primary-soft);
      box-shadow: 0 0 0 4px rgba(117, 89, 232, 0.12);
      background: #fff;
    }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 2px 0 18px;
      color: #5e6a80;
      font-size: 14px;
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      margin-bottom: 0;
    }

    .remember input {
      width: 16px;
      height: 16px;
      padding: 0;
      accent-color: var(--primary);
    }

    .forgot {
      color: var(--primary-dark);
      text-decoration: none;
      font-weight: 750;
      white-space: nowrap;
    }

    .login-btn {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 16px;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      box-shadow: 0 16px 32px rgba(117, 89, 232, 0.24);
      font-size: 15px;
      font-weight: 850;
      letter-spacing: -0.01em;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 38px rgba(117, 89, 232, 0.30);
    }

    .helper {
      margin-top: 14px;
      padding: 12px 14px;
      text-align: center;
      color: #7a8598;
      background: rgba(238, 242, 255, 0.68);
      border: 1px solid #e2e8f7;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.4;
    }

    .bottom-note {
      width: min(1020px, 100%);
      margin: 0 auto;
      text-align: center;
      color: #99a4ba;
      font-size: 12px;
      padding-bottom: 4px;
    }

    @media (max-height: 760px) {
      .page {
        padding-top: 18px;
      }

      .topbar {
        padding-bottom: 14px;
      }

      .login-center {
        padding: 14px 0 8px;
      }

      .login-card {
        padding: 22px 18px;
        width: min(440px, 100%);
      }

      /* .login-icon {
        width: 56px;
        height: 56px;
        margin-bottom: 8px;
      } */

      .login-card h2 {
        font-size: 22px;
      }

      .login-card .subtitle {
        margin-bottom: 14px;
      }

      .role-tabs {
        margin-bottom: 14px;
      }

      input {
        height: 46px;
      }

      .login-btn {
        height: 48px;
      }

      .helper {
        display: none;
      }
    }

    @media (max-width: 720px) {
      body {
        overflow: auto;
      }

      .page {
        padding: 20px 16px 14px;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 14px;
      }

      .status-pill {
        width: 100%;
        text-align: center;
      }

      .login-card {
        padding: 24px 20px;
      }

      .form-row {
        align-items: flex-start;
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <img src="./assets/mp-birla-logo.png" alt="brand-logo" class="brand-logo">
        </div>
        <div class="brand-text">
          <h1>HR-Assistant</h1>
          <p>Role based login</p>
        </div>
      </div>
      <div class="status-pill">Auth Endpoint Pending</div>
    </header>

    <section class="login-center">
      <form class="login-card" id="loginForm">
        <div class="login-icon" aria-hidden="true">
          <img src="./assets/mp-birla-logo.png" alt="brand-logo" class="brand-logo">
        </div>

        <h2 id="formTitle">Welcome back</h2>
        <p class="subtitle" id="formSubtitle">Sign in with your email and password to continue.</p>

        <div class="role-tabs" aria-label="Choose sign in or sign up">
          <button class="role-tab active" type="button" data-mode="signin">Sign In</button>
          <button class="role-tab" type="button" data-mode="signup">Sign Up</button>
        </div>

        <div class="form-group" id="roleGroup" style="display: none;">
          <label for="role">Role</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M12 12c2.5 0 4.5-2 4.5-4.5S14.5 3 12 3 7.5 5 7.5 7.5 9.5 12 12 12z" stroke="currentColor"
                stroke-width="1.8" />
              <path d="M4 21c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </svg>
            <select id="role" name="role"
              style="padding-left: 44px; width: 100%; height: 50px; border: 1px solid #d9e0ef; border-radius: 15px; background: rgba(255,255,255,0.88); font-size: 15px; color: var(--text); outline: none;">
              <option value="user">User</option>
              <option value="hr-employee">HR-Employee</option>
              <option value="admin">Admin</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email address</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M4 6.5h16v11H4v-11z" stroke="currentColor" stroke-width="1.8" />
              <path d="M4.5 7l7.5 6 7.5-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="Enter email address"
              required />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M7 10V8a5 5 0 0110 0v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              <path d="M6 10h12v9H6v-9z" stroke="currentColor" stroke-width="1.8" />
              <path d="M12 14v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </svg>
            <input id="password" name="password" type="password" autocomplete="current-password"
              placeholder="Enter password" required />
          </div>
        </div>

        <div class="form-row" id="rememberRow">
          <label class="remember"><input name="rememberDevice" type="checkbox" /> Remember this device</label>
          <a class="forgot" href="#">Forgot password?</a>
        </div>

        <div class="form-group" id="formError"
          style="display:none; color:#c0392b; font-size:13px; text-align:center; margin-bottom:10px;"></div>

        <button class="login-btn" type="submit" id="submitBtn">Sign In</button>

        <div class="helper">
          Backed by /auth/login and /auth/signup on this server.
        </div>
      </form>
    </section>

    <div class="bottom-note">Configure endpoints before production use</div>
  </main>

  <script>
    // The API (FastAPI/uvicorn) runs on a different port than the static
    // frontend server, so this must point at it explicitly rather than
    // being same-origin ("").  Update the host/port if yours differ.
    const API_BASE = "http://localhost:5002";
    const LOGIN_ENDPOINT = `${API_BASE}/auth/login`;
    const SIGNUP_ENDPOINT = `${API_BASE}/auth/signup`;
    const FORGOT_PASSWORD_ENDPOINT = "";
    // Plain "user" accounts land on the chatbot; "hr-employee" and "admin"
    // go straight to the admin panel (they can jump back to the chatbot
    // from there with the "Chat" button).
    function redirectForRole(role) {
      return role === "user" ? "index.html" : "admin_panel.html";
    }

    const tabs = document.querySelectorAll('.role-tab');
    const form = document.getElementById('loginForm');
    const forgotLink = document.querySelector('.forgot');
    const rememberRow = document.getElementById('rememberRow');
    const roleGroup = document.getElementById('roleGroup');
    const formTitle = document.getElementById('formTitle');
    const formSubtitle = document.getElementById('formSubtitle');
    const submitBtn = document.getElementById('submitBtn');
    const formError = document.getElementById('formError');

    let mode = 'signin'; // 'signin' | 'signup'

    function applyMode() {
      const isSignup = mode === 'signup';
      roleGroup.style.display = isSignup ? '' : 'none';
      rememberRow.style.display = isSignup ? 'none' : 'flex';
      document.getElementById('role').required = isSignup;
      formTitle.textContent = isSignup ? 'Create an account' : 'Welcome back';
      formSubtitle.textContent = isSignup
        ? 'Sign up with your email, password, and role.'
        : 'Sign in with your email and password to continue.';
      submitBtn.textContent = isSignup ? 'Sign Up' : 'Sign In';
      formError.style.display = 'none';
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(item => item.classList.remove('active'));
        tab.classList.add('active');
        mode = tab.dataset.mode;
        applyMode();
      });
    });

    forgotLink.addEventListener('click', event => {
      event.preventDefault();

      if (!FORGOT_PASSWORD_ENDPOINT) {
        console.warn('FORGOT_PASSWORD_ENDPOINT is blank.');
        return;
      }

      window.location.href = FORGOT_PASSWORD_ENDPOINT;
    });

    function showError(message) {
      formError.textContent = message;
      formError.style.display = 'block';
    }

    form.addEventListener('submit', async event => {
      event.preventDefault();
      formError.style.display = 'none';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const isSignup = mode === 'signup';
      const endpoint = isSignup ? SIGNUP_ENDPOINT : LOGIN_ENDPOINT;
      const payload = isSignup
        ? { email, password, role: document.getElementById('role').value }
        : { email, password };

      submitBtn.disabled = true;
      const originalLabel = submitBtn.textContent;
      submitBtn.textContent = isSignup ? 'Signing up…' : 'Signing in…';

      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.detail || 'Request failed. Please try again.');
        }

        // Store the JWT so subsequent API calls can send:
        // Authorization: Bearer <token>
        localStorage.setItem('authToken', result.token);
        localStorage.setItem('userId', result.user_id);
        localStorage.setItem('userEmail', result.email);
        localStorage.setItem('userRole', result.role);
        localStorage.setItem('userTabs', JSON.stringify(result.tabs || []));

        window.location.href = redirectForRole(result.role);
      } catch (error) {
        console.error(error);
        showError(error.message || 'Something went wrong. Please try again.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = originalLabel;
      }
    });

    applyMode();
  </script>
</body>

</html>
