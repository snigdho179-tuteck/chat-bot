<!DOCTYPE html>
<html lang="en">

<head>
  <script>
    // Auth guard: bounce to login.html if there's no active session.
    (function () {
      var token = localStorage.getItem('authToken');
      if (!token) {
        window.location.replace('login.html');
      }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR-Assistant | Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="icon" type="image/png" href="./assets/mp-birla-favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f4f6fb;
      --surface: rgba(255, 255, 255, .88);
      --surface-solid: #ffffff;
      --ink: #111827;
      --ink-soft: #5f6879;
      --ink-faint: #96a0b2;
      --line: rgba(25, 38, 70, .10);
      --accent: #5b5bd6;
      --accent-2: #7c5ce7;
      --accent-soft: #eeefff;
      --good: #22a06b;
      --good-soft: #e4f7ee;
      --bad: #d14f4f;
      --bad-soft: #fdeceb;
      --warn: #b8860b;
      --warn-soft: #fdf3d9;
      --radius: 18px;
      --shadow-sm: 0 1px 2px rgba(17, 24, 39, .04), 0 8px 24px rgba(39, 49, 84, .06);
      --shadow-md: 0 18px 50px rgba(39, 49, 84, .12);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background:
        radial-gradient(circle at 78% -10%, rgba(124, 92, 231, .14), transparent 32rem),
        radial-gradient(circle at 15% 110%, rgba(91, 91, 214, .10), transparent 28rem),
        var(--paper);
      color: var(--ink);
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    button, input, select, textarea { font: inherit; }

    .layout { min-height: 100vh; display: flex; }

    .sidebar {
      width: 260px; flex-shrink: 0;
      background: rgba(248, 250, 255, .92);
      border-right: 1px solid var(--line);
      backdrop-filter: blur(22px);
      display: flex; flex-direction: column;
      padding: 18px 14px;
    }
    .brand { display: flex; align-items: center; gap: 10px; padding: 3px 6px 22px; font-weight: 750; letter-spacing: -.02em; }
    .brand-mark {
      width: 32px; height: 32px; border-radius: 10px; display: grid; place-items: center;
      color: #fff; background: linear-gradient(145deg, var(--accent-2), var(--accent));
      box-shadow: 0 8px 20px rgba(91, 91, 214, .24); flex-shrink: 0;
    }
    .brand-logo {
      width: 36px;
      height: 36px;
      object-fit: contain;
    }
    .side-label { margin: 4px 8px 8px; font-size: 10.5px; font-weight: 700; letter-spacing: .11em; color: var(--ink-faint); text-transform: uppercase; }
    .side-link {
      display: flex; align-items: center; gap: 10px; padding: 11px 12px; border-radius: 12px;
      color: var(--ink-soft); font-size: 13.5px; font-weight: 600; cursor: pointer; margin-bottom: 3px;
      border: 1px solid transparent; transition: .15s ease;
    }
    .side-link:hover { background: rgba(255,255,255,.72); border-color: var(--line); }
    .side-link.active { background: var(--surface-solid); border-color: rgba(91,91,214,.16); color: var(--accent); box-shadow: var(--shadow-sm); }
    .side-link svg { flex-shrink: 0; }
    .sidebar-foot { margin-top: auto; }
    .back-chat {
      display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;
      padding: 11px 14px; color: #fff; background: linear-gradient(135deg, var(--accent-2), var(--accent));
      border: 0; border-radius: 12px; font-size: 13.5px; font-weight: 650; cursor: pointer;
      box-shadow: 0 8px 20px rgba(91, 91, 214, .20);
    }
    .back-chat:hover { filter: brightness(1.04); }

    .app { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .app-inner { max-width: 1080px; width: 100%; margin: 0 auto; padding: 26px clamp(18px, 4vw, 42px) 40px; flex: 1; }

    .header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 18px; border-bottom: 1px solid var(--line); margin-bottom: 24px; }
    .header h1 { font-size: 20px; font-weight: 760; letter-spacing: -.03em; margin: 0 0 4px; }
    .header p { font-size: 12.5px; color: var(--ink-soft); margin: 0; }

    .account { position: relative; }
    .avatar-btn {
      width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--line);
      background: linear-gradient(135deg, #7559e8, #5d46d2); color: #fff; font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--shadow-sm);
    }
    .account-menu {
      position: absolute; top: calc(100% + 8px); right: 0; min-width: 172px;
      background: #fff; border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 14px 34px rgba(20,24,40,.14);
      padding: 6px; display: none; flex-direction: column; gap: 2px; z-index: 40;
    }
    .account-menu.open { display: flex; }
    .account-menu button {
      all: unset; box-sizing: border-box; width: 100%; padding: 9px 10px; border-radius: 8px;
      font-size: 13.5px; font-weight: 600; color: var(--ink); cursor: pointer;
    }
    .account-menu button:hover { background: rgba(117, 89, 232, .10); }
    .account-menu button.danger { color: #c0392b; }
    .account-menu button.danger:hover { background: rgba(192, 57, 43, .10); }
    .account-menu hr { border: none; border-top: 1px solid var(--line); margin: 4px 2px; }

    .page-title { font-size: 17px; font-weight: 750; margin: 0 0 4px; }
    .page-sub { font-size: 12.5px; color: var(--ink-soft); margin: 0 0 18px; }

    .toolbar { display: flex; justify-content: flex-end; margin-bottom: 14px; }
    .btn {
      display: inline-flex; align-items: center; gap: 7px; padding: 10px 16px; border-radius: 12px;
      font-size: 13.5px; font-weight: 650; border: 1px solid transparent; cursor: pointer;
    }
    .btn-primary { color: #fff; background: linear-gradient(135deg, var(--accent-2), var(--accent)); box-shadow: 0 8px 20px rgba(91,91,214,.22); }
    .btn-primary:hover { filter: brightness(1.05); }
    .btn-secondary { background: #fff; border-color: var(--line); color: var(--ink); }
    .btn-secondary:hover { background: var(--accent-soft); }

    .panel { background: var(--surface); border: 1px solid rgba(255,255,255,.9); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); backdrop-filter: blur(14px); }
    table { width: 100%; border-collapse: collapse; }
    thead th { background: rgba(124,92,231,.06); text-align: left; font-size: 10.5px; letter-spacing: .07em; text-transform: uppercase; color: var(--ink-soft); padding: 12px 18px; border-bottom: 1px solid var(--line); }
    tbody td { padding: 13px 18px; border-bottom: 1px solid var(--line); font-size: 13.5px; vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    .u-email { font-weight: 600; }

    .badge { display: inline-flex; padding: 3px 11px; border-radius: 999px; font-size: 10.5px; font-weight: 700; letter-spacing: .03em; text-transform: uppercase; }
    .badge-admin { background: var(--bad-soft); color: var(--bad); }
    .badge-hr-employee { background: var(--accent-soft); color: var(--accent); }
    .badge-user { background: #eef1f5; color: var(--ink-soft); }
    .badge-active { background: var(--good-soft); color: var(--good); text-transform: lowercase; }
    .badge-inactive { background: #eef1f5; color: var(--ink-soft); text-transform: lowercase; }
    .badge-pending { background: var(--warn-soft); color: var(--warn); text-transform: lowercase; }
    .badge-answered { background: var(--good-soft); color: var(--good); text-transform: lowercase; }

    .actions { display: flex; gap: 12px; align-items: center; }
    .icon-btn { background: none; border: none; cursor: pointer; padding: 2px; display: flex; color: var(--ink-faint); }
    .icon-btn.blue { color: var(--accent); }
    .icon-btn.red { color: var(--bad); }
    .icon-btn.green { color: var(--good); }
    .icon-btn:hover { opacity: .7; }

    .overlay { position: fixed; inset: 0; background: rgba(16,24,40,.36); display: none; align-items: center; justify-content: center; z-index: 100; }
    .overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 18px; width: 420px; max-width: 92vw; max-height: 88vh; overflow: auto; box-shadow: var(--shadow-md); }
    .modal-head { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--line); }
    .modal-head h3 { margin: 0; font-size: 15.5px; }
    .modal-close { cursor: pointer; color: var(--ink-soft); background: none; border: none; font-size: 15px; }
    .modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 13px; }
    .modal-foot { padding: 14px 20px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 10px; }
    .field label { display: block; font-size: 12.5px; font-weight: 650; margin-bottom: 6px; color: var(--ink-soft); }
    .field input, .field select, .field textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 11px; font-size: 13.5px; background: #fbfbff; }
    .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,91,214,.12); }
    .field textarea { resize: vertical; min-height: 70px; }
    .check-group { border: 1px solid var(--line); border-radius: 11px; padding: 10px 12px; background: #fbfbff; }
    .check-row { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 4px 0; }
    .hint { font-size: 11.5px; color: var(--ink-faint); margin-top: 5px; }
    .form-error { font-size: 12.5px; color: var(--bad); min-height: 16px; }

    .empty-state { padding: 50px 20px; text-align: center; color: var(--ink-soft); font-size: 13px; }
    .empty-state svg { margin-bottom: 10px; color: #c9cee0; }

    /* ---- Unanswered queries: two-panel layout ---- */
    .queries-grid { display: grid; grid-template-columns: 1.15fr 1fr; gap: 20px; align-items: start; }
    @media (max-width: 900px) { .queries-grid { grid-template-columns: 1fr; } }

    .panel-head { padding: 16px 18px; border-bottom: 1px solid var(--line); font-weight: 700; font-size: 14.5px; }

    .query-list { max-height: 74vh; overflow-y: auto; }
    .query-item { display: flex; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--line); cursor: pointer; }
    .query-item:last-child { border-bottom: none; }
    .query-item:hover { background: rgba(124,92,231,.05); }
    .query-item.active { background: var(--accent-soft); }
    .query-item .q-avatar { color: var(--ink-faint); flex-shrink: 0; margin-top: 2px; }
    .query-item .q-body { min-width: 0; flex: 1; }
    .query-item .q-title { font-weight: 700; font-size: 13.5px; margin-bottom: 2px; }
    .query-item .q-text { font-size: 13px; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .query-item .q-meta { display: flex; align-items: center; gap: 5px; font-size: 11.5px; color: var(--ink-faint); margin-top: 5px; }

    .respond-panel { min-height: 300px; display: flex; flex-direction: column; }
    .respond-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--ink-faint); gap: 10px; padding: 50px 20px; text-align: center; }
    .respond-body { padding: 18px; display: flex; flex-direction: column; gap: 14px; }
    .respond-question { background: #fbfbff; border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; font-size: 13.5px; }
    .respond-question .rq-label { font-size: 10.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 5px; }
    .respond-foot { padding: 14px 18px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 10px; }
    .respond-status { font-size: 12.5px; color: var(--ink-faint); align-self: center; margin-right: auto; }
  </style>
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <img src="./assets/mp-birla-logo.png" alt="brand-logo" class="brand-logo">
        <span>HR-Assistant</span>
      </div>
      <div class="side-label">Admin Panel</div>
      <nav id="sideNav"></nav>
      <div class="sidebar-foot">
        <button class="back-chat" onclick="window.location.href='index.html'">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
          Back to Chat
        </button>
      </div>
    </aside>

    <div class="app">
      <div class="app-inner">
        <div class="header">
          <div>
            <h1 id="pageHeading">Admin</h1>
            <p id="pageSub">Loading your permissions…</p>
          </div>
          <div class="account" id="account">
            <button class="avatar-btn" id="avatarBtn"><span id="avatarInitial">U</span></button>
            <div class="account-menu" id="accountMenu">
              <button type="button" id="chatMenuBtn">Back to Chat</button>
              <hr />
              <button type="button" class="danger" id="logoutMenuBtn">Log out</button>
            </div>
          </div>
        </div>

        <div id="main"></div>
      </div>
    </div>
  </div>

  <!-- Add / edit user modal -->
  <div class="overlay" id="userOverlay">
    <div class="modal">
      <div class="modal-head">
        <h3 id="userModalTitle">Add user</h3>
        <button class="modal-close" onclick="closeUserModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="field"><label>Email</label><input type="email" id="f_email"></div>
        <div class="field" id="passwordField"><label>Password</label><input type="text" id="f_password"></div>
        <div class="field">
          <label>Role</label>
          <select id="f_role" onchange="onRoleChange()">
            <option value="user">User</option>
            <option value="hr-employee">HR Employee</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="f_status"><option value="active">Active</option><option value="inactive">Inactive</option></select>
        </div>
        <div class="field" id="tabsField">
          <label>Panel tabs this user can view</label>
          <div class="check-group" id="tabsChecks"></div>
          <div class="hint">User Management is always admin-only and enforced by the server. Queries and Files can be granted individually.</div>
        </div>
        <div class="form-error" id="userFormError"></div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-secondary" onclick="closeUserModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveUserForm()">Save user</button>
      </div>
    </div>
  </div>

<script>
const API_BASE = `http://${window.location.hostname}:5002`;
const ALL_TABS = ["users", "queries", "files"];
const TAB_META = {
  users:   { label: "User Management",    nav: "User Management" },
  queries: { label: "Unanswered Queries", nav: "Unanswered Queries" },
  files:   { label: "File Management",    nav: "File Management" }
};
function defaultTabsForRole(role) {
  if (role === "admin") return [...ALL_TABS];
  if (role === "hr-employee") return ["queries"];
  return [];
}
function authHeaders() {
  return { "Content-Type": "application/json", "Authorization": `Bearer ${localStorage.getItem('authToken') || ''}` };
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function roleBadge(role) {
  const label = role === "hr-employee" ? "HR EMPLOYEE" : role.toUpperCase();
  return `<span class="badge badge-${role}">${label}</span>`;
}
function logout() {
  localStorage.removeItem('authToken');
  localStorage.removeItem('userId');
  localStorage.removeItem('userEmail');
  localStorage.removeItem('userRole');
  localStorage.removeItem('userTabs');
  window.location.href = 'login.html';
}

const ICONS = {
  users: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
  queries: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 2-3 4"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
  files: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`,
  shield: `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
  edit: `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>`,
  trash: `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>`,
  plus: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  user: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
  chat: `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>`,
  upload: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`,
  inbox: `<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>`
};

let currentUser = null;   // { id, email, role, status, tabs } from /auth/me
let permittedTabs = [];
let activeTab = null;

/* ---------------- boot: verify identity against the server, not just localStorage ---------------- */
(async function boot() {
  try {
    const res = await fetch(`${API_BASE}/auth/me`, { headers: authHeaders() });
    if (res.status === 401) { logout(); return; }
    if (!res.ok) throw new Error('me failed');
    currentUser = await res.json();
  } catch (err) {
    console.error(err);
    document.getElementById('main').innerHTML = `<div class="panel"><div class="empty-state">${ICONS.inbox}<div>Could not reach the API at ${API_BASE}. Make sure the backend is running, then refresh.</div></div></div>`;
    return;
  }

  // Plain "user" accounts never get panel access, even if they land here directly.
  if (currentUser.role === 'user') { window.location.href = 'index.html'; return; }

  localStorage.setItem('userRole', currentUser.role);
  localStorage.setItem('userTabs', JSON.stringify(currentUser.tabs || []));

  // "User Management" is hard-enforced server-side (require_admin) — only
  // show it to admins so the tab never renders into a wall of 403s.
  permittedTabs = ALL_TABS.filter(t => {
    if (t === 'users') return currentUser.role === 'admin';
    return (currentUser.tabs || []).includes(t);
  });
  activeTab = permittedTabs[0] || null;

  renderHeader();
  renderSidebar();
  renderMain();
})();

function renderHeader() {
  document.getElementById('pageHeading').textContent = 'Admin';
  document.getElementById('pageSub').textContent = `${currentUser.email} · ${currentUser.role === 'hr-employee' ? 'HR Employee' : currentUser.role}`;
  const initial = (currentUser.email || 'U').charAt(0).toUpperCase();
  document.getElementById('avatarInitial').textContent = initial;

  const avatarBtn = document.getElementById('avatarBtn');
  const accountMenu = document.getElementById('accountMenu');
  avatarBtn.addEventListener('click', e => { e.stopPropagation(); accountMenu.classList.toggle('open'); });
  document.addEventListener('click', e => { if (!document.getElementById('account').contains(e.target)) accountMenu.classList.remove('open'); });
  document.getElementById('chatMenuBtn').addEventListener('click', () => window.location.href = 'index.html');
  document.getElementById('logoutMenuBtn').addEventListener('click', logout);
}

function renderSidebar() {
  document.getElementById('sideNav').innerHTML = permittedTabs.map(t => `
    <div class="side-link ${t === activeTab ? 'active' : ''}" onclick="switchTab('${t}')">${ICONS[t]} ${TAB_META[t].nav}</div>
  `).join('');
}
function switchTab(t) { activeTab = t; renderSidebar(); renderMain(); }

function renderMain() {
  const main = document.getElementById('main');
  if (!activeTab) {
    main.innerHTML = `<div class="panel"><div class="empty-state">${ICONS.inbox}<div>You don't have access to any panel tabs yet. Ask an admin to grant access.</div></div></div>`;
    return;
  }
  if (activeTab === 'users') renderUsersTab(main);
  if (activeTab === 'queries') renderQueriesTab(main);
  if (activeTab === 'files') renderFilesTab(main);
}

/* ---------------- USER MANAGEMENT (backed by /auth/users on the real API) ---------------- */
async function renderUsersTab(main) {
  main.innerHTML = `<h2 class="page-title">User Management</h2><p class="page-sub">Loading users…</p>`;
  let users;
  try {
    const res = await fetch(`${API_BASE}/auth/users`, { headers: authHeaders() });
    if (!res.ok) throw new Error('list failed');
    users = await res.json();
  } catch (err) {
    main.innerHTML = `<h2 class="page-title">User Management</h2><div class="panel"><div class="empty-state">${ICONS.inbox}<div>Couldn't load users from the API.</div></div></div>`;
    return;
  }

  main.innerHTML = `
    <h2 class="page-title">User Management</h2>
    <p class="page-sub">Create users and control which panel tabs each admin or HR employee can see.</p>
    <div class="toolbar"><button class="btn btn-primary" onclick="openUserModal()">${ICONS.plus} Add user</button></div>
    <div class="panel">
      <table>
        <thead><tr><th>Email</th><th>Role</th><th>Status</th><th>Tabs</th><th>Actions</th></tr></thead>
        <tbody>
          ${users.map(u => `
            <tr>
              <td class="u-email">${escapeHtml(u.email)}</td>
              <td>${roleBadge(u.role)}</td>
              <td><span class="badge badge-${u.status}">${u.status}</span></td>
              <td style="color:var(--ink-soft);font-size:12.5px">${u.tabs.length ? u.tabs.map(t => TAB_META[t].label).join(', ') : '—'}</td>
              <td>
                <div class="actions">
                  <button class="icon-btn ${u.status === 'active' ? 'red' : 'green'}" title="${u.status === 'active' ? 'Deactivate' : 'Activate'}" onclick="toggleStatus('${u.id}','${u.status}')">${ICONS.shield}</button>
                  <button class="icon-btn blue" title="Edit" onclick='openUserModal(${JSON.stringify(u)})'>${ICONS.edit}</button>
                  <button class="icon-btn red" title="Delete" onclick="deleteUser('${u.id}')">${ICONS.trash}</button>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

let editingUserId = null;
function onRoleChange() {
  const role = document.getElementById('f_role').value;
  document.getElementById('tabsField').style.display = role === 'user' ? 'none' : 'block';
  renderTabChecks(defaultTabsForRole(role));
}
function renderTabChecks(checkedTabs) {
  document.getElementById('tabsChecks').innerHTML = ALL_TABS.map(t => `
    <label class="check-row"><input type="checkbox" value="${t}" ${checkedTabs.includes(t) ? 'checked' : ''}> ${TAB_META[t].label}</label>
  `).join('');
}
function openUserModal(u) {
  editingUserId = u ? u.id : null;
  document.getElementById('userFormError').textContent = '';
  document.getElementById('userModalTitle').textContent = u ? 'Edit user' : 'Add user';
  document.getElementById('f_email').value = u ? u.email : '';
  document.getElementById('f_email').disabled = !!u;
  document.getElementById('f_password').value = '';
  document.getElementById('f_password').placeholder = u ? 'Leave blank to keep current password' : '';
  document.getElementById('f_role').value = u ? u.role : 'user';
  document.getElementById('f_status').value = u ? u.status : 'active';
  document.getElementById('tabsField').style.display = (u ? u.role : 'user') === 'user' ? 'none' : 'block';
  renderTabChecks(u ? u.tabs : defaultTabsForRole('user'));
  document.getElementById('userOverlay').classList.add('open');
}
function closeUserModal() { document.getElementById('userOverlay').classList.remove('open'); }

async function saveUserForm() {
  const email = document.getElementById('f_email').value.trim();
  const password = document.getElementById('f_password').value;
  const role = document.getElementById('f_role').value;
  const uiStatus = document.getElementById('f_status').value;
  const tabs = role === 'user' ? [] : Array.from(document.querySelectorAll('#tabsChecks input:checked')).map(c => c.value);
  const errEl = document.getElementById('userFormError');

  try {
    if (editingUserId) {
      const body = { role, status: uiStatus, tabs };
      if (password) body.password = password;
      const res = await fetch(`${API_BASE}/auth/users/${editingUserId}`, { method: 'PUT', headers: authHeaders(), body: JSON.stringify(body) });
      if (!res.ok) { const d = await res.json().catch(() => ({})); throw new Error(d.detail || 'Update failed'); }
    } else {
      if (!email || !password) throw new Error('Email and password are required.');
      const res = await fetch(`${API_BASE}/auth/users`, { method: 'POST', headers: authHeaders(), body: JSON.stringify({ email, password, role, status: uiStatus, tabs }) });
      if (!res.ok) { const d = await res.json().catch(() => ({})); throw new Error(d.detail || 'Create failed'); }
    }
    closeUserModal();
    renderUsersTab(document.getElementById('main'));
  } catch (err) {
    errEl.textContent = err.message;
  }
}

async function toggleStatus(id, current) {
  const next = current === 'active' ? 'inactive' : 'active';
  await fetch(`${API_BASE}/auth/users/${id}`, { method: 'PUT', headers: authHeaders(), body: JSON.stringify({ status: next }) });
  renderUsersTab(document.getElementById('main'));
}
async function deleteUser(id) {
  if (!confirm('Delete this user?')) return;
  const res = await fetch(`${API_BASE}/auth/users/${id}`, { method: 'DELETE', headers: authHeaders() });
  if (!res.ok && res.status !== 204) { const d = await res.json().catch(() => ({})); alert(d.detail || 'Delete failed'); }
  renderUsersTab(document.getElementById('main'));
}

/* ---------------- UNANSWERED QUERIES ----------------
   Backed by the /queries endpoints on the same Flask API (API_BASE),
   which persists rows in unanswered.db. Users "report" a chatbot answer
   from the chat screen (POST /queries); admins/hr-employees pick a
   pending query from the list on the left and submit a reply on the
   right, which PATCHes it to answered. */
let queriesCache = [];
let selectedQueryId = null;

async function fetchQueries() {
  const res = await fetch(`${API_BASE}/queries`, { headers: authHeaders() });
  if (!res.ok) throw new Error('Failed to load queries');
  queriesCache = await res.json();
}

function formatQueryDate(iso) {
  try {
    return new Date(iso).toLocaleString(undefined, {
      day: 'numeric', month: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit'
    });
  } catch { return iso || ''; }
}

async function renderQueriesTab(main) {
  main.innerHTML = `
    <h2 class="page-title">Unanswered Queries</h2>
    <p class="page-sub">Questions the chatbot couldn't answer, reported by users for HR/admin follow-up.</p>
    <div class="queries-grid" id="queriesGrid">
      <div class="empty-state">${ICONS.inbox}<div>Loading…</div></div>
    </div>
  `;
  try {
    await fetchQueries();
  } catch (err) {
    document.getElementById('queriesGrid').innerHTML =
      `<div class="empty-state">${ICONS.inbox}<div>Could not reach the API at ${API_BASE}. Make sure the backend is running.</div></div>`;
    return;
  }
  // Keep the current selection if it's still pending; otherwise clear it.
  if (selectedQueryId && !queriesCache.some(q => q.id === selectedQueryId && q.status === 'pending')) {
    selectedQueryId = null;
  }
  paintQueriesGrid();
}

function paintQueriesGrid() {
  const grid = document.getElementById('queriesGrid');
  if (!grid) return;

  const pending = queriesCache.filter(q => q.status === 'pending');

  grid.innerHTML = `
    <div class="panel">
      <div class="panel-head">Pending Queries</div>
      <div class="query-list" id="queryList">
        ${pending.length ? pending.map(q => `
          <div class="query-item ${q.id === selectedQueryId ? 'active' : ''}" onclick="selectQuery('${q.id}')">
            <span class="q-avatar">${ICONS.user || ''}</span>
            <div class="q-body">
              <div class="q-title">${escapeHtml(q.surveyTitle || 'General')}</div>
              <div class="q-text">${escapeHtml(q.question)}</div>
              <div class="q-meta">🕐 ${formatQueryDate(q.date)}</div>
            </div>
          </div>
        `).join('') : `<div class="empty-state">${ICONS.inbox}<div>No pending queries. Nice and tidy.</div></div>`}
      </div>
    </div>
    <div class="panel respond-panel" id="respondPanel"></div>
  `;
  paintRespondPanel();
}

function paintRespondPanel() {
  const panel = document.getElementById('respondPanel');
  if (!panel) return;

  const q = queriesCache.find(x => x.id === selectedQueryId);

  if (!q) {
    panel.innerHTML = `
      <div class="panel-head">Respond to Query</div>
      <div class="respond-empty">
        ${ICONS.chat || ICONS.inbox}
        <div>Select a query to respond to</div>
      </div>
    `;
    return;
  }

  panel.innerHTML = `
    <div class="panel-head">Respond to Query</div>
    <div class="respond-body">
      <div class="respond-question">
        <div class="rq-label">${escapeHtml(q.surveyTitle || 'General')}</div>
        ${escapeHtml(q.question)}
      </div>
      <div class="field">
        <label>Your answer</label>
        <textarea id="f_liveAnswer" rows="7" placeholder="Type the answer for this question…">${escapeHtml(q.answer || '')}</textarea>
      </div>
    </div>
    <div class="respond-foot">
      <span class="respond-status" id="respondStatus"></span>
      <button class="btn btn-secondary" onclick="selectQuery(null)">Cancel</button>
      <button class="btn btn-primary" onclick="submitAnswer('${q.id}')">Submit answer</button>
    </div>
  `;
}

function selectQuery(id) {
  selectedQueryId = id;
  paintQueriesGrid();
}

async function submitAnswer(id) {
  const answer = document.getElementById('f_liveAnswer').value.trim();
  const statusEl = document.getElementById('respondStatus');
  if (!answer) { statusEl.textContent = 'Please write an answer first.'; return; }

  statusEl.textContent = 'Saving…';
  try {
    const res = await fetch(`${API_BASE}/queries/${id}`, {
      method: 'PATCH',
      headers: authHeaders(),
      body: JSON.stringify({ answer, status: 'answered' }),
    });
    if (!res.ok) throw new Error('Failed to save');

    selectedQueryId = null;
    await fetchQueries();
    paintQueriesGrid();
  } catch (err) {
    statusEl.textContent = 'Could not save the answer. Try again.';
  }
}

async function deleteQuery(id) {
  if (!confirm('Delete this query?')) return;
  await fetch(`${API_BASE}/queries/${id}`, { method: 'DELETE', headers: authHeaders() });
  if (selectedQueryId === id) selectedQueryId = null;
  await fetchQueries();
  paintQueriesGrid();
}

/* ---------------- FILE MANAGEMENT ----------------
   NOTE: same as above — no upload/ingestion endpoint was provided, so
   this is a local placeholder until the RAG indexing pipeline exposes one. */
function getFiles() { return JSON.parse(localStorage.getItem('hr_files') || '[]'); }
function saveFiles(l) { localStorage.setItem('hr_files', JSON.stringify(l)); }

function renderFilesTab(main) {
  const files = getFiles();
  main.innerHTML = `
    <h2 class="page-title">File Management</h2>
    <p class="page-sub">Reference material and handbook files for the assistant to draw on.</p>
    <div class="toolbar">
      <input type="file" id="fileInput" style="display:none" onchange="handleFileUpload(event)">
      <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">${ICONS.upload} Upload file</button>
    </div>
    <div class="panel">
      <table>
        <thead><tr><th>File name</th><th>Size</th><th>Uploaded</th><th>Action</th></tr></thead>
        <tbody>
          ${files.length ? files.map(f => `
            <tr><td>${escapeHtml(f.name)}</td><td>${f.size}</td><td>${f.date}</td>
            <td><button class="icon-btn red" title="Delete" onclick="deleteFile('${f.id}')">${ICONS.trash}</button></td></tr>
          `).join('') : `<tr><td colspan="4"><div class="empty-state">${ICONS.inbox}<div>No files uploaded yet.</div></div></td></tr>`}
        </tbody>
      </table>
    </div>
  `;
}
function handleFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const files = getFiles();
  files.push({ id: 'f' + Date.now(), name: file.name, size: Math.round(file.size / 1024) + ' KB', date: new Date().toLocaleDateString('en-GB') });
  saveFiles(files);
  renderFilesTab(document.getElementById('main'));
}
function deleteFile(id) {
  if (!confirm('Delete this file?')) return;
  saveFiles(getFiles().filter(f => f.id !== id));
  renderFilesTab(document.getElementById('main'));
}
</script>
